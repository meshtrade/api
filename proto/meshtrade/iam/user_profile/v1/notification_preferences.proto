syntax = "proto3";

package meshtrade.iam.user_profile.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/meshtrade/api/go/iam/user_profile/v1;user_profile_v1";
option java_package = "co.meshtrade.api.iam.user_profile.v1";

message NotificationPreferences {
  ChannelSettings security_alerts = 1 [(buf.validate.field).cel = {
    id: "security_alerts_minimum_channel"
    message: "You must keep at least one channel enabled for security alerts."
    expression: "this.email_enabled || this.sms_enabled"
  }];

  ChannelSettings transactional_alerts = 2 [(buf.validate.field).cel = {
    id: "transactional_alerts_minimum_channel"
    message: "You must keep at least one channel enabled for transactional alerts."
    expression: "this.email_enabled || this.sms_enabled"
  }];

  // OPTIONAL CATEGORIES: No validation rules, they can all be false
  ChannelSettings account_updates = 3;
  ChannelSettings platform_updates = 4;
  ChannelSettings marketing = 5;

  google.protobuf.Timestamp updated_at = 6;
}

message ChannelSettings {
  bool email_enabled = 1;
  bool sms_enabled = 2;
}
